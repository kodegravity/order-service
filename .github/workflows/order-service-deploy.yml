name: order-service — Build & Deploy

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "order-service/**"          # only fire when order-service files change

  workflow_dispatch:                # allow one-click manual runs from GitHub UI
    inputs:
      reason:
        description: "Reason for manual deploy"
        required: false
        default: "Manual trigger"

# ─────────────────────────────────────────────────────────────────────────────
# GLOBAL ENVIRONMENT
# ─────────────────────────────────────────────────────────────────────────────
env:
  AWS_REGION:           ${{ vars.AWS_REGION }}
  ECR_REPOSITORY:       food-delivery/order-service   # full ECR repository path
  ECS_CLUSTER:          food-delivery-dev-cluster
  ECS_SERVICE:          order-service
  CONTAINER_NAME:       order-service
  TASK_DEFINITION_FILE: order-service/ecs-task-definition.json

# Cancel any in-progress run for the same branch so pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — TEST
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: order-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('order-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Maven tests
        run: mvn verify -B

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — BUILD & DEPLOY
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    permissions:
      id-token: write     # required for GitHub OIDC token
      contents: read

    defaults:
      run:
        working-directory: order-service

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 3. Maven dependency cache ─────────────────────────────────────────────
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('order-service/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4. Build JAR ──────────────────────────────────────────────────────────
      # -DskipTests → tests already ran in the 'test' job above.
      - name: Build JAR (skip tests)
        run: mvn package -DskipTests -B

      # ── 5. Configure AWS credentials via OIDC ─────────────────────────────────
      # GitHub exchanges its OIDC token for temporary AWS credentials.
      # No long-lived AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY needed.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:    ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:        ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-OrderService-${{ github.run_id }}

      # ── 6. Debug — AWS identity ───────────────────────────────────────────────
      # Confirms which IAM role was assumed. If credentials are wrong this step
      # fails here with a clear message rather than a cryptic push error later.
      - name: Print AWS caller identity
        run: aws sts get-caller-identity

      # ── 7. Login to Amazon ECR ────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 8. Debug — ECR registry info ──────────────────────────────────────────
      - name: Print ECR registry
        run: |
          echo "ECR Registry : ${{ steps.login-ecr.outputs.registry }}"
          echo "ECR Repo     : $ECR_REPOSITORY"
          echo "Full URI     : ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY"

      # ── 9. Verify ECR repository exists ───────────────────────────────────────
      # Fails fast with a clear error if the ECR repo doesn't exist,
      # instead of getting a cryptic error during docker push.
      - name: Verify ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --query 'repositories[0].repositoryUri' \
            --output text

      # ── 10. Build & push Docker image ─────────────────────────────────────────
      # Dockerfile:    order-service/Dockerfile  (working-directory is order-service)
      # Build context: order-service/            ('.' resolves to working-directory)
      # Tags pushed:   :latest  and  :<git-sha>
      #
      #   :latest    → always points to the newest build
      #   :<git-sha> → immutable; use for rollbacks and audit logs
      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY"

          echo "Building: $IMAGE_URI:$IMAGE_TAG"

          docker build \
            -t "$IMAGE_URI:$IMAGE_TAG" \
            -t "$IMAGE_URI:latest" \
            -f Dockerfile \
            .

          docker push "$IMAGE_URI:$IMAGE_TAG"
          docker push "$IMAGE_URI:latest"

          echo "Pushed: $IMAGE_URI:$IMAGE_TAG"
          echo "Pushed: $IMAGE_URI:latest"

          echo "image=$IMAGE_URI:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ── 11. Debug — final image URI ───────────────────────────────────────────
      - name: Print final image URI
        run: echo "Image deployed → ${{ steps.build-image.outputs.image }}"

      # ── 12. Render ECS task definition ────────────────────────────────────────
      # Reads order-service/ecs-task-definition.json, swaps the image field for
      # the 'order-service' container with the new versioned URI, writes to temp file.
      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.TASK_DEFINITION_FILE }}
          container-name:  ${{ env.CONTAINER_NAME }}
          image:           ${{ steps.build-image.outputs.image }}

      # ── 13. Deploy to ECS Fargate ─────────────────────────────────────────────
      # Registers a new task definition revision, updates the ECS service,
      # and waits for the rolling deploy to finish before marking the job successful.
      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.render-task-def.outputs.task-definition }}
          service:                    ${{ env.ECS_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # ── 14. Deployment summary ────────────────────────────────────────────────
      - name: Print deployment summary
        run: |
          echo "### ✅ Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field        | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| ------------ | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| Service      | $ECS_SERVICE |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster      | $ECS_CLUSTER |" >> $GITHUB_STEP_SUMMARY
          echo "| ECR Repo     | $ECR_REPOSITORY |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag    | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region       | $AWS_REGION |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
